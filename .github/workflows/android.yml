name: Android CI / Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradle Wrapper
        run: chmod +x gradlew

      - name: Keep Gradle Wrapper Safe (Self-Healing)
        run: |
          mkdir -p gradle/wrapper
          # Direct verification of gradle-wrapper.jar integrity
          if ! jar tf gradle/wrapper/gradle-wrapper.jar > /dev/null 2>&1; then
            echo "⚠️ gradle-wrapper.jar is corrupted or invalid. Downloading official clean JAR..."
            curl -sSLo gradle/wrapper/gradle-wrapper.jar "https://github.com/gradle/gradle/raw/v8.12.0/gradle/wrapper/gradle-wrapper.jar"
          else
            echo "✅ gradle-wrapper.jar is valid."
          fi

      - name: Create Placeholder Environment File
        run: |
          touch .env
          echo "GEMINI_API_KEY=placeholder_api_key" >> .env

      - name: Build Android App (APKs)
        run: ./gradlew assembleDebug assembleRelease

      - name: Upload APKs Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-apks
          path: app/build/outputs/apk/**/*.apk
