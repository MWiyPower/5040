name: Android CI / Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.12 # Bypasses gradle-wrapper.jar by installing Gradle globally

      - name: Create Placeholder Environment File
        run: |
          touch .env
          echo "GEMINI_API_KEY=placeholder_api_key" >> .env
          # If you have developer keystore properties as GitHub secrets, you can append them here:
          # echo "KEYSTORE_PATH=${{ secrets.KEYSTORE_PATH }}" >> .env
          # echo "STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}" >> .env
          # echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> .env
          # echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> .env

      - name: Build Android App (APKs)
        run: gradle :app:assembleDebug :app:assembleRelease

      - name: Upload APKs Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-apks
          path: app/build/outputs/apk/**/*.apk
