name: Android CI / Build APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create .env
        run: |
          echo "GEMINI_API_KEY=placeholder_api_key" > .env

      - name: Build APKs
        run: |
          gradle assembleDebug assembleRelease --stacktrace

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-build-apks
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk          # echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> .env
          # echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> .env

      - name: Build Android App (APKs)
        run: gradle :app:assembleDebug :app:assembleRelease

      - name: Upload APKs Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-apks
          path: app/build/outputs/apk/**/*.apk
